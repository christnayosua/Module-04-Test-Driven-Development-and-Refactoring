<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>ADV Shop</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>

        body {
            background: #f4f6f9;
        }

        .main-title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .section-title {
            font-weight: 600;
            margin-top: 35px;
            margin-bottom: 20px;
        }

        .card {
            border-radius: 12px;
            transition: all 0.25s ease;
            border: none;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.12);
        }

        .icon {
            font-size: 35px;
            margin-bottom: 12px;
        }

    </style>

</head>

<body>

<div class="container mt-5 text-center">

    <h1 class="main-title">ADV Shop</h1>
    <p class="subtitle">Manage inventory, orders, and payments easily</p>

    <hr>

    <!-- INVENTORY SECTION -->

    <h4 class="section-title">Inventory</h4>

    <div class="row justify-content-center">

        <div class="col-md-5 mb-4">
            <div class="card p-4">
                <div class="card-body">

                    <i class="fas fa-box icon text-primary"></i>

                    <h5>Products</h5>

                    <a th:href="@{/product/list}"
                       class="btn btn-outline-primary btn-sm mt-2">
                        View Products
                    </a>

                </div>
            </div>
        </div>

        <div class="col-md-5 mb-4">
            <div class="card p-4">
                <div class="card-body">

                    <i class="fas fa-plus-circle icon text-success"></i>

                    <h5>Add Product</h5>

                    <a th:href="@{/product/create}"
                       class="btn btn-outline-success btn-sm mt-2">
                        Create Product
                    </a>

                </div>
            </div>
        </div>

    </div>


    <!-- ORDER SECTION -->

    <h4 class="section-title">Orders</h4>

    <div class="row justify-content-center">

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <div class="card-body">

                    <i class="fas fa-shopping-cart icon text-success"></i>

                    <h5>Create Order</h5>

                    <a th:href="@{/order/create}"
                       class="btn btn-outline-success btn-sm mt-2">
                        Create
                    </a>

                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <div class="card-body">

                    <i class="fas fa-history icon text-secondary"></i>

                    <h5>Order History</h5>

                    <a th:href="@{/order/history}"
                       class="btn btn-outline-secondary btn-sm mt-2">
                        View
                    </a>

                </div>
            </div>
        </div>

    </div>


    <!-- PAYMENT SECTION -->

    <h4 class="section-title">Payments</h4>

    <div class="row justify-content-center">

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <div class="card-body">

                    <i class="fas fa-file-invoice-dollar icon text-dark"></i>

                    <h5>Payment Admin</h5>

                    <a th:href="@{/payment/admin/list}"
                       class="btn btn-outline-dark btn-sm mt-2">
                        Manage Payments
                    </a>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
