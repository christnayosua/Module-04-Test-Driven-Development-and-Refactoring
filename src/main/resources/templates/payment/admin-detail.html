<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>

        body {
            background: #f4f6f9;
        }

        .payment-card {
            border-radius: 12px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-sm p-4 payment-card">

                <h3 class="text-center mb-4">
                    <i class="fas fa-user-shield text-primary"></i>
                    Payment Admin Detail
                </h3>

                <hr>

                <div class="mb-3">

                    <strong>Payment ID</strong>

                    <div class="text-muted" th:text="${payment?.id}">
                        PAYMENT_ID
                    </div>

                </div>

                <div class="mb-4">

                    <strong>Status</strong>

                    <div>

                        <span class="badge"
                              th:classappend="${payment?.status == 'SUCCESS'} ? 'badge-success' :
                                              (${payment?.status == 'REJECTED'} ? 'badge-danger' :
                                              'badge-warning')"
                              th:text="${payment?.status}">
                            STATUS
                        </span>

                    </div>

                </div>

                <hr>

                <div class="text-center mb-3">

                    <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}"
                          method="post">

                        <button name="status"
                                value="SUCCESS"
                                class="btn btn-success btn-sm mr-2">

                            <i class="fas fa-check"></i>
                            Approve

                        </button>

                        <button name="status"
                                value="REJECTED"
                                class="btn btn-danger btn-sm">

                            <i class="fas fa-times"></i>
                            Reject

                        </button>

                    </form>

                </div>

                <div class="text-center">

                    <a th:href="@{/payment/admin/list}"
                       class="btn btn-outline-secondary btn-sm mr-2">
                        Back to List
                    </a>

                    <a th:href="@{/}"
                       class="btn btn-outline-primary btn-sm">
                        Home
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
