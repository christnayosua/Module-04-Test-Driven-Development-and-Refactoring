<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Payments</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>

<body style="background:#f4f6f9">

<div class="container mt-5">

    <div class="card shadow-sm p-4">

        <h3 class="mb-4 text-center">
            <i class="fas fa-file-invoice-dollar text-primary"></i>
            Payment List
        </h3>

        <table class="table table-hover text-center">

            <thead class="thead-light">

            <tr>
                <th>Payment ID</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="payment : ${payments}">

                <td th:text="${payment.id}"></td>

                <td>

                    <span class="badge"
                          th:classappend="${payment.status == 'SUCCESS'} ? 'badge-success' :
                                          (${payment.status == 'REJECTED'} ? 'badge-danger' :
                                          'badge-warning')"
                          th:text="${payment.status}">
                    </span>

                </td>

                <td>

                    <a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}"
                       class="btn btn-info btn-sm">

                        <i class="fas fa-eye"></i>
                        View

                    </a>

                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(payments)}">

                <td colspan="3" class="text-muted">
                    No payments found
                </td>

            </tr>

            </tbody>

        </table>

        <div class="text-center mt-3">

            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">
                Back to Home
            </a>

        </div>

    </div>

</div>

</body>
</html>
